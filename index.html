<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Amit Bharti — Senior UX Designer. Ride through an interactive design journey across SaaS, AI, and enterprise product work."
    />
    <title>Amit Bharti — Design Journey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <!-- LANDING -->
    <div id="landing" class="landing">
      <div class="landing__grain" aria-hidden="true"></div>
      <header class="landing__header">
        <span class="landing__logo">Amit Bharti</span>
        <div class="landing__social">
          <a href="https://www.linkedin.com/in/amit-bharti-568a1b139" target="_blank" rel="noopener" aria-label="LinkedIn">in</a>
          <a href="https://www.behance.net/amitbharti1" target="_blank" rel="noopener" aria-label="Behance">Be</a>
        </div>
      </header>
      <main class="landing__main">
        <div class="landing__copy">
          <p class="landing__eyebrow">Senior UX Designer · Portfolio Journey</p>
          <h1 class="landing__title">
            Ride through my<br />
            <em>design journey</em>
          </h1>
          <p class="landing__lead" id="landing-intro"></p>
          <div class="landing__chips" id="landing-chips"></div>
          <button type="button" class="btn-start" id="btn-start">
            <span class="btn-start__text">Start Journey</span>
            <span class="btn-start__icon" aria-hidden="true">→</span>
          </button>
          <p class="landing__hint">Scroll · Arrow keys · Click 3D landmarks to explore</p>
        </div>
        <div class="landing__visual">
          <div class="landing__portrait-ring"></div>
          <img src="assets/hero-banner.svg" alt="Amit Bharti" class="landing__portrait" width="400" height="400" />
          <div class="landing__badge">
            <span id="landing-years">8+</span>
            <small>Years UX</small>
          </div>
        </div>
      </main>
      <noscript>
        <section class="noscript-fallback">
          <h2>Amit Bharti — Senior UX Designer</h2>
          <p>Nearly 8 years in SaaS, AI, and enterprise UX at SymphonyAI Media.</p>
          <p>Email: maranatha.amee@gmail.com · Phone: +91 9041209208</p>
        </section>
      </noscript>
    </div>

    <!-- JOURNEY WORLD -->
    <div id="journey" class="journey" hidden>
      <div class="hud" role="navigation" aria-label="Journey navigation">
        <button type="button" class="hud__exit" id="btn-exit" title="Back to landing">← Exit</button>
        <div class="hud__progress">
          <span class="hud__label">Journey</span>
          <div class="hud__bar"><span class="hud__fill" id="hud-fill"></span></div>
          <span class="hud__km" id="hud-km">0 km</span>
        </div>
        <nav class="hud__nav" id="hud-nav" aria-label="Jump to section"></nav>
      </div>

      <div class="journey-viewport" id="viewport">
        <div id="canvas-host" class="canvas-host"></div>

        <aside class="glass-panel" id="glass-panel" aria-live="polite" hidden>
          <button type="button" class="glass-panel__close" id="panel-close" aria-label="Close panel">×</button>
          <div class="glass-panel__inner" id="panel-inner"></div>
        </aside>

        <div class="journey-hint" aria-hidden="true">
          <span>Scroll to ride</span>
          <span class="journey-hint__keys">↑ ↓ ← →</span>
        </div>
      </div>

      <div class="scroll-spacer" id="scroll-spacer"></div>
    </div>

    <!-- Case study modal -->
    <dialog class="case-modal" id="case-modal" aria-labelledby="case-title">
      <button type="button" class="case-modal__close" id="case-close" aria-label="Close">×</button>
      <div class="case-modal__body" id="case-body"></div>
    </dialog>

    <div class="toast" id="toast" role="status"></div>

    <script src="content.js"></script>
    <script type="module" src="journey.js"></script>
  </body>
</html>
